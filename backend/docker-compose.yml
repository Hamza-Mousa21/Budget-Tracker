services:
  mysql:
    image: mysql:8.0
    container_name: BudgetTracker
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: BudgetTracker
      MYSQL_USER: budget
      MYSQL_PASSWORD: budgetsecret
    ports:
      - "3309:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "budget", "-pbudgetsecret"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data: